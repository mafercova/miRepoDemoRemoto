<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demostracion de pasarela de pago con Strip</title>
</head>
<body>
    <h1>Pagina principal del proyecto</h1>
    <div>
        <button id="boton">
            Pagar
        </button>
    </div>
    
    <script>
        console.log("Conectado")
        const bottom=document.getElementById("boton");
        boton.addEventListener('click', async () => {
            const response = await fetch("/pagar", {
                method: 'POST',
            });
            const data = await response.json();
            window.location.href=data.url;
        });

    </script>
</body>
</html>
